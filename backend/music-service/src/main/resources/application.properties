server.port=${PORT:10113}
spring.config.import=optional:file:.env[.properties],optional:file:music-service/.env[.properties],optional:file:backend/music-service/.env[.properties]

spring.application.name=music-service

eureka.client.service-url.defaultZone=http://localhost:10100/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=${MUSIC_VOTE_DB_URL:jdbc:h2:mem:musicvotedb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${MUSIC_VOTE_DB_USERNAME:sa}
spring.datasource.password=${MUSIC_VOTE_DB_PASSWORD:}
spring.datasource.driver-class-name=${MUSIC_VOTE_DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${MUSIC_VOTE_DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

spotify.client-id=${SPOTIFY_CLIENT_ID:}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:10101/music-service/api/music-votes/spotify/callback}
spotify.scope=${SPOTIFY_SCOPE:playlist-read-private playlist-read-collaborative user-read-private user-read-email user-read-playback-state user-modify-playback-state}

musicvote.public-url-template=${MUSIC_VOTE_PUBLIC_URL_TEMPLATE:http://localhost:3000/music-vote/%s}
musicvote.gateway-base-url=${MUSIC_VOTE_GATEWAY_BASE_URL:http://127.0.0.1:10101}
