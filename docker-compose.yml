services:
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"

  discovery-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE: discovery-service
    environment:
      EUREKA_INSTANCE_HOSTNAME: discovery-service
    ports:
      - "10100:10100"

  auth-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE: auth-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:10100/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - discovery-service

  user-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE: user-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:10100/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - discovery-service

  place-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE: place-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:10100/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - discovery-service

  product-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE: product-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:10100/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - discovery-service
      - kafka

  order-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE: order-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:10100/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - discovery-service
      - kafka

  music-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE: music-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:10100/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPOTIFY_REDIRECT_URI: http://127.0.0.1:10101/music-service/api/music-votes/spotify/callback
      MUSIC_VOTE_PUBLIC_URL_TEMPLATE: http://localhost:3000/music-vote/%s
      MUSIC_VOTE_GATEWAY_BASE_URL: http://127.0.0.1:10101
    depends_on:
      - discovery-service

  gateway-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE: gateway-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:10100/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "10101:10101"
    depends_on:
      - discovery-service
      - auth-service
      - user-service
      - place-service
      - product-service
      - order-service
      - music-service

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:10101
    ports:
      - "3000:80"
    depends_on:
      - gateway-service
